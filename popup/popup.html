<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Extractor Pro</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
<div class="app">

  <!-- ── Header ─────────────────────────── -->
  <header class="header">
    <div class="header-left">
      <div class="logo-wrap">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#6366f1"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
          <rect x="2" y="2" width="20" height="20" rx="4" fill="url(#lg1)" opacity="0.15"/>
          <rect x="2" y="2" width="20" height="20" rx="4" stroke="url(#lg1)" stroke-width="1.5"/>
          <circle cx="8.5" cy="8.5" r="2" fill="url(#lg1)"/>
          <path d="M2 16l5-5 4 4 3-3 8 8" stroke="url(#lg1)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="brand">
        <span class="brand-name">Media Extractor</span>
        <span class="brand-tag">PRO</span>
      </div>
    </div>
    <div class="header-right">
      <div class="count-pill" id="countPill">
        <span class="count-num" id="countNum">–</span>
        <span class="count-label">found</span>
      </div>
      <button class="icon-btn" id="refreshBtn" title="Re-scan page">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </header>

  <!-- ── Navigation Tabs ─────────────────── -->
  <div class="tabs">
    <button class="tab-btn active" id="tabImages">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Images
    </button>
    <button class="tab-btn" id="tabVideos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      Videos
    </button>
  </div>

  <!-- ── Filter Bar ──────────────────────── -->
  <div class="filter-bar">
    <div class="search-wrap">
      <svg class="search-ico" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
        <path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input id="searchInput" type="text" placeholder="Search by URL or keyword…" autocomplete="off" spellcheck="false"/>
      <button class="clear-search" id="clearSearch" title="Clear">✕</button>
    </div>

    <div class="filter-row">
      <!-- Image format filters -->
      <div class="chip-group" id="imageTypeFilters">
        <button class="chip active" data-type="all">All</button>
        <button class="chip" data-type="jpg">JPG</button>
        <button class="chip" data-type="png">PNG</button>
        <button class="chip" data-type="gif">GIF</button>
        <button class="chip" data-type="webp">WEBP</button>
        <button class="chip" data-type="svg">SVG</button>
      </div>
      <!-- Video format filters -->
      <div class="chip-group" id="videoTypeFilters" style="display:none">
        <button class="chip active" data-type="all">All</button>
        <button class="chip" data-type="mp4">MP4</button>
        <button class="chip" data-type="webm">WEBM</button>
        <button class="chip" data-type="youtube">YouTube</button>
        <button class="chip" data-type="vimeo">Vimeo</button>
      </div>

      <div class="right-filters">
        <select id="sizeFilter" title="Minimum dimension">
          <option value="0">Any size</option>
          <option value="50">≥ 50px</option>
          <option value="100">≥ 100px</option>
          <option value="300">≥ 300px</option>
          <option value="500">≥ 500px</option>
          <option value="1000">≥ 1000px</option>
        </select>
        <select id="sortBy" title="Sort order">
          <option value="default">Default</option>
          <option value="dimensions-desc">Largest first</option>
          <option value="dimensions-asc">Smallest first</option>
          <option value="type">By type</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ── Toolbar ──────────────────────────── -->
  <div class="toolbar">
    <label class="check-label">
      <input type="checkbox" id="selectAll" />
      <span class="check-custom"></span>
      <span>Select all</span>
    </label>
    <span class="sel-count" id="selCount">0 selected</span>
    <button class="txt-btn" id="viewToggle" title="Toggle view">
      <svg id="viewToggleIcon" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
        <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
        <rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
        <rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>
      </svg>
    </button>
  </div>

  <!-- ── Grid / List ─────────────────────── -->
  <main class="gallery" id="gallery">
    <!-- Loading -->
    <div class="state loading" id="stateLoading">
      <div class="spinner"></div>
      <p>Scanning page…</p>
    </div>
    <!-- Empty -->
    <div class="state empty" id="stateEmpty" style="display:none">
      <svg viewBox="0 0 80 80" fill="none">
        <rect x="8" y="8" width="64" height="64" rx="10" stroke="#94a3b8" stroke-width="2"/>
        <path d="M8 56l18-18 14 14 10-10 22 22" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
        <circle cx="29" cy="30" r="6" stroke="#94a3b8" stroke-width="2"/>
      </svg>
      <p>No media found</p>
      <span>Try adjusting your filters or visit another page</span>
    </div>
    <!-- Media grid -->
    <div class="image-grid" id="imageGrid"></div>
  </main>

  <!-- ── Bottom Bar ─────────────────────── -->
  <footer class="bottom-bar">
    <button class="btn btn-ghost" id="copyUrlsBtn">
      <svg viewBox="0 0 24 24" fill="none">
        <rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/>
        <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/>
      </svg>
      Copy URLs
    </button>
    <button class="btn btn-primary" id="downloadBtn">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 16l-5-5h3V4h4v7h3l-5 5z"/>
        <path d="M19 19H5v2h14v-2z"/>
      </svg>
      <span id="downloadLabel">Download All</span>
    </button>
  </footer>

  <!-- ── Toast ──────────────────────────── -->
  <div class="toast" id="toast"></div>

  <!-- ── Preview Modal ──────────────────── -->
  <div class="modal" id="modal">
    <div class="modal-bg" id="modalBg"></div>
    <div class="modal-box">
      <button class="modal-close" id="modalClose">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="modal-img-wrap">
        <img id="previewImg" src="" alt="Preview" style="display:none;" />
        <video id="previewVideo" controls src="" style="display:none; width:100%; max-height:220px; outline:none; border-radius:8px; background:#000;"></video>
        <iframe id="previewIframe" src="" style="display:none; width:100%; height:220px; border:none; border-radius:8px;" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
      </div>
      <div class="modal-meta" id="modalMeta"></div>
      <div class="modal-url" id="modalUrl"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modalCopy">Copy URL</button>
        <button class="btn btn-ghost" id="modalOpenTab">Open in Tab</button>
        <button class="btn btn-primary" id="modalDownload">Download</button>
      </div>
    </div>
  </div>

</div><!-- /.app -->
<script src="popup.js"></script>
</body>
</html>
